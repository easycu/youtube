```html
<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>유튜브 받아쓰기</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#0f0f0f;
  color:white;
  font-family:sans-serif;
}

.container{
  display:flex;
  height:100vh;
}

.main{
  flex:1;
  display:flex;
  flex-direction:column;
  padding:20px;
}

.top{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

input{
  flex:1;
  padding:14px;
  font-size:16px;
  border:none;
  border-radius:12px;
  background:#1f1f1f;
  color:white;
  outline:none;
}

input::placeholder{
  color:#999;
}

button{
  border:none;
  border-radius:12px;
  padding:14px 18px;
  cursor:pointer;
  font-weight:bold;
  color:white;
  transition:0.2s;
}

button:hover{
  opacity:0.9;
}

#addBtn{
  background:#4d7cff;
}

#player{
  width:100%;
  height:420px;
  background:black;
  border-radius:16px;
  overflow:hidden;
}

.memo-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:18px;
  margin-bottom:10px;
}

.memo-title{
  font-size:22px;
  font-weight:bold;
}

#clearMemoBtn{
  background:#ff4d4d;
}

textarea{
  flex:1;
  resize:none;
  border:none;
  outline:none;
  border-radius:16px;
  padding:18px;
  background:#1a1a1a;
  color:white;
  font-size:18px;
  line-height:1.7;
}

textarea::placeholder{
  color:#888;
}

.sidebar{
  width:320px;
  background:#171717;
  border-left:1px solid #2a2a2a;
  padding:20px;
  overflow-y:auto;
}

.sidebar-title{
  font-size:24px;
  font-weight:bold;
  margin-bottom:15px;
}

.video-item{
  background:#222;
  border-radius:14px;
  padding:12px;
  margin-bottom:12px;
  cursor:pointer;
  transition:0.2s;
}

.video-item:hover{
  transform:scale(1.02);
  background:#2d2d2d;
}

.video-url{
  word-break:break-all;
  font-size:14px;
  line-height:1.5;
  margin-bottom:10px;
}

.delete-btn{
  background:#444;
  width:100%;
}

.empty{
  color:#888;
  line-height:1.6;
}

@media(max-width:900px){

  .container{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
    height:300px;
    border-left:none;
    border-top:1px solid #2a2a2a;
  }

}

</style>
</head>

<body>

<div class="container">

  <div class="main">

    <div class="top">

      <input
        type="text"
        id="youtubeUrl"
        placeholder="유튜브 URL 입력"
      >

      <button id="addBtn">
        추가
      </button>

    </div>

    <div id="player"></div>

    <div class="memo-top">

      <div class="memo-title">
        메모장
      </div>

      <button id="clearMemoBtn">
        모두 지우기
      </button>

    </div>

    <textarea
      id="memo"
      placeholder="여기에 받아쓰기"
    ></textarea>

  </div>

  <div class="sidebar">

    <div class="sidebar-title">
      영상 목록
    </div>

    <div id="playlist"></div>

  </div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

let player;

let playlist =
JSON.parse(localStorage.getItem("playlist")) || [];

const playlistElement =
document.getElementById("playlist");

const addBtn =
document.getElementById("addBtn");

const youtubeUrlInput =
document.getElementById("youtubeUrl");

const memo =
document.getElementById("memo");

const clearMemoBtn =
document.getElementById("clearMemoBtn");

memo.value =
localStorage.getItem("memo") || "";

memo.addEventListener("input", () => {

  localStorage.setItem(
    "memo",
    memo.value
  );

});

clearMemoBtn.addEventListener("click", () => {

  const ok = confirm(
    "메모를 모두 삭제할까요?"
  );

  if(!ok) return;

  memo.value = "";

  localStorage.removeItem("memo");

});

function onYouTubeIframeAPIReady(){

  player = new YT.Player("player", {
    height:"420",
    width:"100%",
    videoId:""
  });

}

function getVideoId(url){

  const regExp =
  /(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\n?#]+)/;

  const match = url.match(regExp);

  return match ? match[1] : null;

}

function savePlaylist(){

  localStorage.setItem(
    "playlist",
    JSON.stringify(playlist)
  );

}

function renderPlaylist(){

  playlistElement.innerHTML = "";

  if(playlist.length === 0){

    playlistElement.innerHTML = `
      <div class="empty">
        아직 추가된 영상이 없습니다.
      </div>
    `;

    return;

  }

  playlist.forEach((video, index) => {

    const div =
    document.createElement("div");

    div.className = "video-item";

    div.addEventListener("click", () => {

      player.loadVideoById(
        video.videoId
      );

    });

    const urlText =
    document.createElement("div");

    urlText.className = "video-url";

    urlText.textContent = video.url;

    const deleteBtn =
    document.createElement("button");

    deleteBtn.className = "delete-btn";

    deleteBtn.textContent = "삭제";

    deleteBtn.addEventListener("click", (e) => {

      e.stopPropagation();

      playlist.splice(index,1);

      savePlaylist();

      renderPlaylist();

    });

    div.appendChild(urlText);

    div.appendChild(deleteBtn);

    playlistElement.appendChild(div);

  });

}

addBtn.addEventListener("click", () => {

  const url =
  youtubeUrlInput.value.trim();

  const videoId =
  getVideoId(url);

  if(!videoId){

    alert(
      "올바른 유튜브 URL이 아닙니다."
    );

    return;

  }

  playlist.push({
    url,
    videoId
  });

  savePlaylist();

  renderPlaylist();

  youtubeUrlInput.value = "";

});

youtubeUrlInput.addEventListener("keydown", (e) => {

  if(e.key === "Enter"){

    addBtn.click();

  }

});

renderPlaylist();

</script>

</body>
</html>
```
